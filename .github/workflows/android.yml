name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/with-node@v4
      with:
        node-version: 20

    - name: Force Create Package & Install Tools
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Force Initialize Capacitor Config
      run: |
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.mastersecure.premium",
          "appName": "MasterSecure",
          "webDir": "www",
          "bundledWebRuntime": false
        }
        EOF

    - name: Create Empty Project Structure if Missing
      run: |
        mkdir -p www
        if [ ! -f www/index.html ]; then
          echo "<h1>MasterSecure Premium</h1>" > www/index.html
        fi

    - name: Add Android Platform
      run: |
        npx cap add android
        npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterSecure-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
